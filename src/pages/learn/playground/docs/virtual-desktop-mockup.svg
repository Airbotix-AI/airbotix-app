  <rect x="346" y="120" width="34" height="704" fill="#FAF6EC"/>
  <g font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="12.5">
    <g fill="#C7C0D5" text-anchor="end">
      <text x="374" y="150">1</text><text x="374" y="174">2</text><text x="374" y="198">3</text>
      <text x="374" y="222">4</text><text x="374" y="246">5</text><text x="374" y="270">6</text>
      <text x="374" y="294">7</text><text x="374" y="318">8</text><text x="374" y="342">9</text>
      <text x="374" y="366">10</text>
    </g>
    <text x="390" y="150"><tspan fill="#B5179E" font-weight="700">const</tspan><tspan fill="#1F1B2D"> W = </tspan><tspan fill="#FF7A66">800</tspan><tspan fill="#1F1B2D">, H = </tspan><tspan fill="#FF7A66">600</tspan><tspan fill="#1F1B2D">;</tspan></text>
    <text x="390" y="174"><tspan fill="#B5179E" font-weight="700">class</tspan><tspan fill="#1F1B2D"> Pong </tspan><tspan fill="#B5179E" font-weight="700">extends</tspan><tspan fill="#5DAEFF"> Phaser</tspan><tspan fill="#1F1B2D">.Scene {</tspan></text>
    <text x="390" y="198" fill="#1F1B2D">  create() {</text>
    <text x="390" y="222" fill="#1F1B2D">    this.ball = this.add</text>
    <text x="390" y="246"><tspan fill="#1F1B2D">      .circle(W/</tspan><tspan fill="#FF7A66">2</tspan><tspan fill="#1F1B2D">, H/</tspan><tspan fill="#FF7A66">2</tspan><tspan fill="#1F1B2D">, </tspan><tspan fill="#FF7A66">12</tspan><tspan fill="#1F1B2D">);</tspan></text>
    <text x="390" y="270" fill="#1F1B2D">    this.physics.add</text>
    <text x="390" y="294" fill="#1F1B2D">      .existing(this.ball);</text>
    <text x="390" y="318" fill="#1F1B2D">  }</text>
    <text x="390" y="342" fill="#1F1B2D">}</text>
    <text x="390" y="366"><tspan fill="#B5179E" font-weight="700">new</tspan><tspan fill="#5DAEFF"> Phaser</tspan><tspan fill="#1F1B2D">.Game({ scene: Pong });</tspan></text>
  </g>

