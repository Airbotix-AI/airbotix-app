<svg xmlns="http://www.w3.org/2000/svg" width="540" height="960" viewBox="0 0 540 960" font-family="'Baloo 2','Nunito',system-ui,sans-serif">
  <!-- Snack Stack — upgrade panel mockup (ORIGINAL design, genre conventions; not a reproduction) -->
  <defs>
    <linearGradient id="coin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE08A"/><stop offset="1" stop-color="#FFB836"/>
    </linearGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2a1c10" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- dimmed game behind -->
  <rect width="540" height="960" fill="#FFD8A8"/>
  <rect width="540" height="960" fill="#2a1c10" opacity="0.45"/>

  <!-- ===== slide-up sheet ===== -->
  <rect x="0" y="220" width="540" height="740" rx="34" fill="#FFF7EC" filter="url(#soft2)"/>
  <rect x="246" y="240" width="48" height="7" rx="3.5" fill="#E2C9A6"/>

  <!-- header -->
  <text x="34" y="300" font-size="26" font-weight="800" fill="#3A2E25">Upgrades</text>
  <g transform="translate(478,278)"><circle r="20" fill="#F1E2CC"/><path d="M-7,-7 L7,7 M7,-7 L-7,7" stroke="#7a5a33" stroke-width="4" stroke-linecap="round"/></g>

  <!-- tabs -->
  <g transform="translate(34,322)">
    <rect width="150" height="40" rx="20" fill="#FF8A3D"/>
    <text x="75" y="26" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">Stations</text>
    <g transform="translate(162,0)"><rect width="130" height="40" rx="20" fill="#F1E2CC"/><text x="65" y="26" text-anchor="middle" font-size="15" font-weight="800" fill="#a07a4a">Staff</text></g>
    <g transform="translate(304,0)"><rect width="150" height="40" rx="20" fill="#F1E2CC"/><text x="75" y="26" text-anchor="middle" font-size="15" font-weight="800" fill="#a07a4a">Boosts</text></g>
  </g>

  <!-- ===== station card 1 (affordable upgrade) ===== -->
  <g transform="translate(34,390)">
    <rect width="472" height="118" rx="20" fill="#fff" filter="url(#soft2)"/>
    <rect width="10" height="118" rx="5" fill="#7BBE6B"/>            <!-- rarity-color border -->
    <!-- icon -->
    <g transform="translate(64,59)">
      <rect x="-34" y="-30" width="68" height="60" rx="14" fill="#F25C54"/>
      <ellipse cx="0" cy="-6" rx="22" ry="7" fill="#F6C26B"/><rect x="-22" y="-8" width="44" height="6" fill="#7BBE6B"/>
      <ellipse cx="0" cy="0" rx="22" ry="7" fill="#8A5A33"/><ellipse cx="0" cy="9" rx="22" ry="8" fill="#F6C26B"/>
    </g>
    <text x="108" y="42" font-size="18" font-weight="800" fill="#3A2E25">Burger Grill</text>
    <text x="108" y="64" font-size="14" font-weight="700" fill="#8a6a3a">Lv 14  ·  +$210 / serve</text>
    <!-- next-perk progress -->
    <rect x="108" y="78" width="190" height="10" rx="5" fill="#F1E2CC"/>
    <rect x="108" y="78" width="120" height="10" rx="5" fill="#FFB836"/>
    <text x="108" y="104" font-size="11" font-weight="700" fill="#a07a4a">Next ×2 at Lv 25</text>
    <!-- upgrade button (affordable, glowing) -->
    <g transform="translate(316,28)">
      <rect width="146" height="62" rx="18" fill="#FF8A3D" filter="url(#soft2)"/>
      <text x="14" y="22" font-size="11" font-weight="800" fill="#fff" opacity="0.9">+$210</text>
      <text x="73" y="46" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">⬆ 4.5K</text>
    </g>
  </g>

  <!-- ===== station card 2 (affordable, has manager / automated) ===== -->
  <g transform="translate(34,524)">
    <rect width="472" height="118" rx="20" fill="#fff" filter="url(#soft2)"/>
    <rect width="10" height="118" rx="5" fill="#5BB6E8"/>
    <g transform="translate(64,59)">
      <rect x="-32" y="-30" width="64" height="60" rx="14" fill="#5BB6E8"/>
      <path d="M-14,-16 H14 L10,16 H-10 Z" fill="#fff"/><rect x="-14" y="-18" width="28" height="6" rx="3" fill="#F25C54"/>
    </g>
    <text x="108" y="42" font-size="18" font-weight="800" fill="#3A2E25">Drink Machine</text>
    <text x="108" y="64" font-size="14" font-weight="700" fill="#8a6a3a">Lv 11  ·  +$96 / serve</text>
    <g transform="translate(108,76)"><rect width="120" height="22" rx="11" fill="#E9F7EF"/><text x="60" y="16" text-anchor="middle" font-size="12" font-weight="800" fill="#3a9b6b">⚙ auto ✓</text></g>
    <g transform="translate(316,28)">
      <rect width="146" height="62" rx="18" fill="#FF8A3D" filter="url(#soft2)"/>
      <text x="14" y="22" font-size="11" font-weight="800" fill="#fff" opacity="0.9">+$96</text>
      <text x="73" y="46" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">⬆ 1.2K</text>
    </g>
  </g>

  <!-- ===== station card 3 (locked / unaffordable) ===== -->
  <g transform="translate(34,658)" opacity="0.65">
    <rect width="472" height="118" rx="20" fill="#F3EAD9"/>
    <rect width="10" height="118" rx="5" fill="#C9B79a"/>
    <g transform="translate(64,59)">
      <rect x="-32" y="-30" width="64" height="60" rx="14" fill="#D8C7A8"/>
      <rect x="-12" y="-10" width="24" height="20" rx="6" fill="#fff"/><rect x="-8" y="-18" width="16" height="12" rx="6" fill="none" stroke="#fff" stroke-width="4"/>
    </g>
    <text x="108" y="46" font-size="18" font-weight="800" fill="#8a7a5a">Coffee Bar  🔒</text>
    <text x="108" y="70" font-size="14" font-weight="700" fill="#a89876">Unlocks at restaurant Lv 7</text>
    <g transform="translate(316,28)">
      <rect width="146" height="62" rx="18" fill="#D9CBB2"/>
      <text x="73" y="40" text-anchor="middle" font-size="19" font-weight="800" fill="#8a7a5a">🔒 22.0K</text>
    </g>
  </g>

  <!-- ===== bulk-buy toggle ===== -->
  <g transform="translate(34,800)">
    <text x="0" y="24" font-size="14" font-weight="700" fill="#8a6a3a">Buy:</text>
    <g transform="translate(56,0)"><rect width="64" height="36" rx="18" fill="#FF8A3D"/><text x="32" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">x1</text></g>
    <g transform="translate(128,0)"><rect width="74" height="36" rx="18" fill="#F1E2CC"/><text x="37" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#a07a4a">x10</text></g>
    <g transform="translate(210,0)"><rect width="80" height="36" rx="18" fill="#F1E2CC"/><text x="40" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#a07a4a">MAX</text></g>
  </g>

  <!-- money chip (carried from HUD) -->
  <g transform="translate(330,800)">
    <rect width="176" height="36" rx="18" fill="#fff" filter="url(#soft2)"/>
    <circle cx="24" cy="18" r="13" fill="url(#coin2)"/><text x="24" y="23" text-anchor="middle" font-size="12" font-weight="800" fill="#9a5a00">$</text>
    <text x="46" y="24" font-size="18" font-weight="800" fill="#3A2E25">12.4K</text>
  </g>

  <text x="270" y="906" text-anchor="middle" font-size="13" font-weight="700" fill="#a07a4a">SNACK STACK — upgrade panel (mockup) · bright = affordable · grey = locked</text>
</svg>
