<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" font-family="'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="desk" cx="50%" cy="40%" r="75%"><stop offset="0" stop-color="#181222"/><stop offset="1" stop-color="#0C0913"/></radialGradient>
    <linearGradient id="bub" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF8FBE"/><stop offset="1" stop-color="#FF4F8F"/></linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3DD9A9"/><stop offset="1" stop-color="#2BB68C"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7FC2FF"/><stop offset="1" stop-color="#DCF6EC"/></linearGradient>
    <filter id="win" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.6"/></filter>
    <filter id="bdg" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <symbol id="ic-close" viewBox="0 0 24 24"><path d="M7 7l10 10M17 7L7 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-play" viewBox="0 0 24 24"><path d="M8 6l10 6-10 6z" fill="currentColor"/></symbol>
    <symbol id="ic-loop" viewBox="0 0 24 24"><path d="M4 12a6 6 0 0 1 6-6h7l-2.5-2.5M20 12a6 6 0 0 1-6 6H7l2.5 2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-mute" viewBox="0 0 24 24"><path d="M5 9v6h4l5 4V5L9 9H5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M16 9l5 6M21 9l-5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-full" viewBox="0 0 24 24"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-film" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M3 15h18M8 5v14M16 5v14" stroke="currentColor" stroke-width="1.6"/></symbol>
    <symbol id="ic-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="ic-insert" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-spark" viewBox="0 0 24 24"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z" fill="currentColor"/></symbol>
    <symbol id="ic-pencil" viewBox="0 0 24 24"><path d="M5 19l1-4L17 4l3 3L9 18l-4 1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="ic-move" viewBox="0 0 24 24"><path d="M12 4v16M4 12h16M8 8l4-4 4 4M8 16l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-swap" viewBox="0 0 24 24"><path d="M4 9h13l-3-3M20 15H7l3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-trash" viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="760" fill="url(#desk)"/>

  <!-- detail surface -->
  <g filter="url(#win)"><rect x="70" y="36" width="1460" height="684" rx="18" fill="#242133" stroke="#7C5CFF" stroke-opacity="0.5" stroke-width="2"/></g>
  <path d="M70 54a18 18 0 0 1 18-18h1424a18 18 0 0 1 18 18v36H70z" fill="#2E2A40"/>
  <use href="#ic-film" x="92" y="46" width="24" height="24" color="#9B8CFF"/>
  <text x="126" y="64" font-size="16" font-weight="800" fill="#FFFFFF">intro_cutscene.mp4</text>
  <rect x="324" y="48" width="70" height="24" rx="12" fill="#7C5CFF" opacity="0.22"/><text x="359" y="64" text-anchor="middle" font-size="11.5" font-weight="800" fill="#BCB0FF">video</text>
  <use href="#ic-close" x="1490" y="51" width="22" height="22" color="#9B94AC"/>

  <!-- ===== LEFT: video player ===== -->
  <text x="100" y="124" font-size="12.5" font-weight="800" fill="#8B84A0">PLAYER</text>
  <text x="170" y="124" font-size="12" fill="#6E6786">(inline &lt;video&gt; — videos play opaque, so no transparency/background check)</text>
  <!-- video stage 16:9 -->
  <rect x="100" y="136" width="700" height="394" rx="14" fill="#0F0B18"/>
  <!-- scene content -->
  <g>
    <rect x="112" y="148" width="676" height="280" rx="8" fill="url(#scene)"/>
    <rect x="112" y="360" width="676" height="68" fill="#9ED9B6"/>
    <!-- food truck -->
    <g transform="translate(360,250)"><rect width="200" height="96" rx="14" fill="#FF7A66"/><rect x="18" y="20" width="80" height="44" rx="8" fill="#FFF1DE"/><rect y="-26" width="200" height="30" rx="8" fill="#FF5B7E"/><circle cx="48" cy="104" r="18" fill="#3D3851"/><circle cx="152" cy="104" r="18" fill="#3D3851"/></g>
    <circle cx="660" cy="210" r="34" fill="#FFE26B"/>
  </g>
  <rect x="112" y="148" width="676" height="280" rx="8" fill="#000" opacity="0.18"/>
  <!-- big play overlay -->
  <circle cx="450" cy="288" r="44" fill="#000" opacity="0.45"/><circle cx="450" cy="288" r="44" fill="none" stroke="#fff" stroke-opacity="0.7" stroke-width="2"/><use href="#ic-play" x="436" y="274" width="30" height="30" color="#fff"/>
  <!-- inline transport bar -->
  <rect x="112" y="470" width="676" height="48" rx="8" fill="#1B1828"/>
  <use href="#ic-play" x="126" y="484" width="22" height="22" color="#fff"/>
  <text x="160" y="500" font-size="12.5" font-weight="700" fill="#E7E2F0">0:00</text><text x="198" y="500" font-size="11.5" fill="#6E6786">/ 0:08</text>
  <rect x="248" y="490" width="430" height="6" rx="3" fill="#3A3548"/><rect x="248" y="490" width="0" height="6" rx="3" fill="#7C5CFF"/><circle cx="248" cy="493" r="7" fill="#fff"/>
  <use href="#ic-mute" x="690" y="484" width="22" height="22" color="#B7B0C6"/>
  <use href="#ic-loop" x="722" y="484" width="22" height="22" color="#B7B0C6"/>
  <use href="#ic-full" x="754" y="484" width="22" height="22" color="#B7B0C6"/>

  <!-- timeline thumbnails -->
  <text x="100" y="558" font-size="12.5" font-weight="800" fill="#8B84A0">TIMELINE</text>
  <g>
    <rect x="100" y="568" width="108" height="60" rx="7" fill="url(#scene)" stroke="#7C5CFF" stroke-width="2"/>
    <rect x="216" y="568" width="108" height="60" rx="7" fill="url(#scene)" stroke="#46415C"/>
    <rect x="332" y="568" width="108" height="60" rx="7" fill="url(#scene)" stroke="#46415C"/>
    <rect x="448" y="568" width="108" height="60" rx="7" fill="url(#scene)" stroke="#46415C"/>
    <rect x="564" y="568" width="108" height="60" rx="7" fill="url(#scene)" stroke="#46415C"/>
    <rect x="680" y="568" width="108" height="60" rx="7" fill="url(#scene)" stroke="#46415C"/>
  </g>
  <text x="100" y="654" font-size="12" fill="#6E6786">Scrub the timeline; the first frame doubles as the poster shown before playback.</text>

  <!-- divider -->
  <line x1="832" y1="110" x2="832" y2="700" stroke="#3A3650"/>

  <!-- ===== RIGHT column ===== -->
  <rect x="864" y="116" width="630" height="150" rx="14" fill="#201D2E" stroke="#3A3650"/>
  <text x="884" y="146" font-size="13" font-weight="800" fill="#FFFFFF">Details</text>
  <g font-size="12.5">
    <text x="884" y="176" fill="#8B84A0">Path</text><text x="1476" y="176" text-anchor="end" font-family="monospace" fill="#C7C0D5">assets/video/intro_cutscene.mp4</text>
    <text x="884" y="204" fill="#8B84A0">Type · size</text><text x="1476" y="204" text-anchor="end" fill="#C7C0D5">MP4 (H.264) · 1.9 MB</text>
    <text x="884" y="232" fill="#8B84A0">Dimensions · fps</text><text x="1476" y="232" text-anchor="end" fill="#C7C0D5">640 × 360 · 30 fps</text>
    <text x="884" y="256" fill="#8B84A0">Duration</text><text x="1476" y="256" text-anchor="end" fill="#C7C0D5">0:08.0</text>
  </g>

  <rect x="864" y="282" width="630" height="120" rx="14" fill="#201D2E" stroke="#3A3650"/>
  <text x="884" y="312" font-size="13" font-weight="800" fill="#FFFFFF">Use it in your code</text>
  <g transform="translate(1316,294)"><rect width="80" height="28" rx="9" fill="#2E2A40" stroke="#46415C"/><use href="#ic-copy" x="8" y="5" width="18" height="18" color="#B7B0C6"/><text x="50" y="19" text-anchor="middle" font-size="11.5" font-weight="700" fill="#E7E2F0">Copy</text></g>
  <g transform="translate(1404,294)"><rect width="90" height="28" rx="9" fill="url(#mint)"/><use href="#ic-insert" x="8" y="5" width="18" height="18" color="#0E2A20"/><text x="56" y="19" text-anchor="middle" font-size="11.5" font-weight="800" fill="#0E2A20">Insert</text></g>
  <rect x="884" y="332" width="590" height="56" rx="10" fill="#15121E" stroke="#46415C"/>
  <g font-family="monospace" font-size="12.5">
    <text x="900" y="358"><tspan fill="#E6E1F0">this.load.</tspan><tspan fill="#5DAEFF">video</tspan><tspan fill="#E6E1F0">(</tspan><tspan fill="#3DD9A9">'intro'</tspan><tspan fill="#E6E1F0">, </tspan><tspan fill="#3DD9A9">'assets/video/intro_cutscene.mp4'</tspan><tspan fill="#E6E1F0">);</tspan></text>
    <text x="900" y="378"><tspan fill="#6E6786">// later:  this.add.video(x, y, 'intro').play();</tspan></text>
  </g>

  <!-- AI panel — future/disabled -->
  <rect x="864" y="418" width="630" height="120" rx="14" fill="#1B1828" stroke="#3A3650" stroke-dasharray="6 5"/>
  <use href="#ic-spark" x="884" y="434" width="20" height="20" color="#6E6786"/>
  <text x="912" y="450" font-size="13" font-weight="800" fill="#9B94AC">Generate a video</text>
  <rect x="1290" y="432" width="96" height="22" rx="11" fill="#2E2A40" stroke="#46415C"/><text x="1338" y="447" text-anchor="middle" font-size="10.5" font-weight="800" fill="#8B84A0">coming later</text>
  <text x="884" y="486" font-size="12.5" fill="#8B84A0">Video generation is heavier on the backend — deferred to a later phase.</text>
  <text x="884" y="508" font-size="12.5" fill="#8B84A0">For now: import a clip (file picker / drag-drop) or reuse a generated background.</text>
  <g transform="translate(884,516)" opacity="0.5"><rect width="200" height="16" rx="8" fill="none"/></g>

  <!-- manage -->
  <g font-size="12" font-weight="700">
    <g transform="translate(864,560)"><rect width="120" height="40" rx="11" fill="#221E30" stroke="#46415C"/><use href="#ic-pencil" x="16" y="11" width="18" height="18" color="#B7B0C6"/><text x="74" y="25" text-anchor="middle" fill="#E7E2F0">Rename</text></g>
    <g transform="translate(994,560)"><rect width="110" height="40" rx="11" fill="#221E30" stroke="#46415C"/><use href="#ic-move" x="16" y="11" width="18" height="18" color="#B7B0C6"/><text x="68" y="25" text-anchor="middle" fill="#E7E2F0">Move</text></g>
    <g transform="translate(1114,560)"><rect width="124" height="40" rx="11" fill="#221E30" stroke="#46415C"/><use href="#ic-swap" x="16" y="11" width="18" height="18" color="#B7B0C6"/><text x="78" y="25" text-anchor="middle" fill="#E7E2F0">Replace</text></g>
    <g transform="translate(1374,560)"><rect width="120" height="40" rx="11" fill="#3A1620" stroke="#FF7A66" stroke-opacity="0.5"/><use href="#ic-trash" x="16" y="11" width="18" height="18" color="#FF7A66"/><text x="76" y="25" text-anchor="middle" fill="#FF9A88">Delete</text></g>
  </g>
  <text x="864" y="636" font-size="12" fill="#6E6786">Heads-up: video files are large — they live as base64 in memory + IndexedDB, so the viewer warns past a soft size cap on import.</text>

  <!-- annotation badges -->
  <g font-weight="800" font-size="14" text-anchor="middle" filter="url(#bdg)">
    <g><circle cx="450" cy="288" r="14" fill="#FF7A66" stroke="#fff" stroke-width="2.5"/><text x="450" y="293" fill="#fff">1</text></g>
    <g><circle cx="110" cy="598" r="14" fill="#FF7A66" stroke="#fff" stroke-width="2.5"/><text x="110" y="603" fill="#fff">2</text></g>
    <g><circle cx="884" cy="302" r="14" fill="#FFD43B" stroke="#fff" stroke-width="2.5"/><text x="884" y="307" fill="#1F1B2D">3</text></g>
    <g><circle cx="912" cy="438" r="14" fill="#FFD43B" stroke="#fff" stroke-width="2.5"/><text x="912" y="443" fill="#1F1B2D">4</text></g>
    <g><circle cx="876" cy="624" r="14" fill="#FFD43B" stroke="#fff" stroke-width="2.5"/><text x="876" y="629" fill="#1F1B2D">5</text></g>
  </g>

  <!-- legend -->
  <rect x="0" y="760" width="1600" height="240" fill="#16121F"/><line x1="0" y1="760" x2="1600" y2="760" stroke="#46415C"/>
  <text x="40" y="800" font-size="19" font-weight="800" fill="#FFFFFF">Asset Viewer — video detail</text>
  <text x="360" y="800" font-size="13" fill="#8B84A0">— preview region swaps to an inline &lt;video&gt; player; video is a new supported kind (mp4 / webm)</text>
  <g font-size="13">
    <g transform="translate(40,828)">
      <g><circle cx="11" cy="8" r="11" fill="#FF7A66"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">1</text><text x="30" y="4" font-weight="800" fill="#fff">Inline player + poster</text><text x="30" y="23" fill="#B7B0C6">Click to play; mute / loop / fullscreen. No multi-background toggle — video is opaque.</text></g>
      <g transform="translate(0,54)"><circle cx="11" cy="8" r="11" fill="#FF7A66"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">2</text><text x="30" y="4" font-weight="800" fill="#fff">Timeline thumbnails</text><text x="30" y="23" fill="#B7B0C6">Scrub by frame; the first frame doubles as the poster shown before playback.</text></g>
    </g>
    <g transform="translate(820,828)">
      <g><circle cx="11" cy="8" r="11" fill="#FFD43B"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#1F1B2D">3</text><text x="30" y="4" font-weight="800" fill="#fff">Code-ref = load.video</text><text x="30" y="23" fill="#B7B0C6">Adds mp4/webm to ASSET_MIME; snippet shows load + add.video(...).play().</text></g>
      <g transform="translate(0,54)"><circle cx="11" cy="8" r="11" fill="#FFD43B"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#1F1B2D">4</text><text x="30" y="4" font-weight="800" fill="#fff">AI generation deferred</text><text x="30" y="23" fill="#B7B0C6">Affordance shown but disabled — video gen is a heavier later phase; import is the path for now.</text></g>
      <g transform="translate(0,108)"><circle cx="11" cy="8" r="11" fill="#FFD43B"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#1F1B2D">5</text><text x="30" y="4" font-weight="800" fill="#fff">Size warning</text><text x="30" y="23" fill="#B7B0C6">Large clips bloat the in-memory/IndexedDB VFS — import warns past a soft cap (open point §10).</text></g>
    </g>
  </g>
</svg>
