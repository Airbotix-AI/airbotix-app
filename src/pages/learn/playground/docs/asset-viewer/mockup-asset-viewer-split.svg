<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" font-family="'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bub" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF8FBE"/><stop offset="1" stop-color="#FF4F8F"/></linearGradient>
    <linearGradient id="runbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C5CFF"/><stop offset="1" stop-color="#5DAEFF"/></linearGradient>
    <pattern id="checker" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="#3A3548"/><rect width="10" height="10" fill="#2C2839"/><rect x="10" y="10" width="10" height="10" fill="#2C2839"/></pattern>
    <filter id="bdg" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <symbol id="ic-chat" viewBox="0 0 24 24"><path d="M5 5h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-8l-4 4v-4H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="ic-code" viewBox="0 0 24 24"><path d="M9 8l-4 4 4 4M15 8l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-game" viewBox="0 0 24 24"><path d="M7 9h10a5 5 0 0 1 4.5 7.2c-.8 1.6-3 1.8-4.2.5L16 15H8l-1.3 1.7c-1.2 1.3-3.4 1.1-4.2-.5A5 5 0 0 1 7 9z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="15.5" cy="11.8" r="1" fill="currentColor"/><circle cx="17.5" cy="13.6" r="1" fill="currentColor"/></symbol>
    <symbol id="ic-assets" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="9.5" r="1.8" fill="currentColor"/><path d="M5 17l4.5-4.5 3 3 3-3L21 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></symbol>
    <symbol id="ic-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-upload" viewBox="0 0 24 24"><path d="M12 16V5M8 9l4-4 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-spark" viewBox="0 0 24 24"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z" fill="currentColor"/></symbol>
    <symbol id="ic-grid" viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="4" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="4" y="13" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="13" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="ic-split" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14 5v14" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="ic-play" viewBox="0 0 24 24"><path d="M8 6l10 6-10 6z" fill="currentColor"/></symbol>
    <symbol id="ic-film" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M3 15h18M8 5v14M16 5v14" stroke="currentColor" stroke-width="1.6"/></symbol>
    <symbol id="ic-sound" viewBox="0 0 24 24"><path d="M5 9v6h4l5 4V5L9 9H5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M17 9a4 4 0 0 1 0 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  </defs>

  <!-- app base -->
  <rect x="0" y="0" width="1600" height="900" fill="#17121F"/>

  <!-- top bar -->
  <rect x="0" y="0" width="1600" height="46" fill="#16121F"/><line x1="0" y1="46" x2="1600" y2="46" stroke="#46415C"/>
  <use href="#ic-grid" x="22" y="12" width="22" height="22" color="#3DD9A9"/><text x="52" y="30" font-size="14" font-weight="800" fill="#3DD9A9">playground</text>
  <rect x="1396" y="9" width="142" height="28" rx="14" fill="#201D2E" stroke="#46415C"/>
  <use href="#ic-grid" x="1408" y="14" width="16" height="16" color="#8B84A0"/><text x="1448" y="27" text-anchor="middle" font-size="11" font-weight="700" fill="#8B84A0">Win</text>
  <rect x="1465" y="12" width="70" height="22" rx="11" fill="#5DAEFF"/><use href="#ic-split" x="1474" y="14" width="16" height="16" color="#0E0B16"/><text x="1514" y="27" text-anchor="middle" font-size="11" font-weight="800" fill="#0E0B16">Split</text>

  <!-- ===== LEFT region (tabbed: Chat / Code / Assets) ===== -->
  <rect x="0" y="46" width="1000" height="854" fill="#1B1828"/>
  <!-- tab strip -->
  <rect x="0" y="46" width="1000" height="42" fill="#201D2E"/><line x1="0" y1="88" x2="1000" y2="88" stroke="#3A3650"/>
  <g>
    <rect x="14" y="54" width="104" height="26" rx="9" fill="#221E30" stroke="#46415C"/><use href="#ic-chat" x="26" y="58" width="18" height="18" color="#B7B0C6"/><text x="52" y="71" font-size="12" fill="#B7B0C6">Chat</text>
    <rect x="128" y="54" width="104" height="26" rx="9" fill="#221E30" stroke="#46415C"/><use href="#ic-code" x="140" y="58" width="18" height="18" color="#B7B0C6"/><text x="166" y="71" font-size="12" fill="#B7B0C6">Code</text>
    <rect x="242" y="54" width="118" height="26" rx="9" fill="#FF6BA9" opacity="0.16"/><rect x="242" y="54" width="118" height="26" rx="9" fill="none" stroke="#FF6BA9" stroke-opacity="0.6"/><use href="#ic-assets" x="254" y="58" width="18" height="18" color="#FF6BA9"/><text x="280" y="71" font-size="12" font-weight="700" fill="#FFFFFF">Assets</text>
  </g>

  <!-- left rail (categories) -->
  <rect x="0" y="88" width="220" height="812" fill="#201D2E"/><line x1="220" y1="88" x2="220" y2="900" stroke="#3A3650"/>
  <rect x="16" y="106" width="188" height="32" rx="9" fill="#2E2A40" stroke="#46415C"/><use href="#ic-search" x="24" y="113" width="18" height="18" color="#8B84A0"/><text x="50" y="127" font-size="12.5" fill="#8B84A0">Search assets…</text>
  <g font-size="13">
    <rect x="12" y="152" width="196" height="32" rx="9" fill="#FF6BA9" opacity="0.16"/><rect x="12" y="152" width="196" height="32" rx="9" fill="none" stroke="#FF6BA9" stroke-opacity="0.5"/><text x="28" y="173" font-weight="800" fill="#FFFFFF">All assets</text><text x="194" y="173" text-anchor="end" font-weight="700" fill="#FF9AC6">42</text>
    <text x="28" y="213" fill="#C7C0D5">Characters</text><text x="194" y="213" text-anchor="end" fill="#8B84A0">12</text>
    <text x="28" y="247" fill="#C7C0D5">Stations</text><text x="194" y="247" text-anchor="end" fill="#8B84A0">9</text>
    <text x="28" y="281" fill="#C7C0D5">UI</text><text x="194" y="281" text-anchor="end" fill="#8B84A0">11</text>
    <text x="28" y="315" fill="#C7C0D5">VFX</text><text x="194" y="315" text-anchor="end" fill="#8B84A0">5</text>
    <text x="28" y="349" fill="#C7C0D5">Backgrounds</text><text x="194" y="349" text-anchor="end" fill="#8B84A0">2</text>
    <text x="28" y="383" fill="#C7C0D5">Icons</text><text x="194" y="383" text-anchor="end" fill="#8B84A0">8</text>
    <text x="28" y="417" fill="#C7C0D5">Audio</text><text x="194" y="417" text-anchor="end" fill="#8B84A0">3</text>
  </g>
  <line x1="12" y1="810" x2="208" y2="810" stroke="#3A3650"/>
  <g transform="translate(12,828)"><rect width="92" height="40" rx="11" fill="#2E2A40" stroke="#46415C"/><use href="#ic-upload" x="12" y="10" width="20" height="20" color="#B7B0C6"/><text x="56" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#E7E2F0">Import</text></g>
  <g transform="translate(112,828)"><rect width="96" height="40" rx="11" fill="url(#bub)"/><use href="#ic-spark" x="12" y="10" width="20" height="20" color="#fff"/><text x="58" y="25" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">Generate</text></g>

  <!-- grid -->
  <text x="244" y="120" font-size="14" font-weight="800" fill="#FFFFFF">All assets</text>
  <text x="350" y="120" font-size="12.5" fill="#8B84A0">42 items · drag &amp; drop or paste to import</text>
  <g font-size="12">
    <!-- row 1 -->
    <g transform="translate(244,140)">
      <rect width="226" height="190" rx="14" fill="#15121E" stroke="#46415C"/>
      <rect x="14" y="14" width="198" height="118" rx="10" fill="url(#checker)"/>
      <g transform="translate(78,36)"><rect width="70" height="86" rx="10" fill="#7FC2FF"/><circle cx="35" cy="26" r="14" fill="#FFE0C2"/></g>
      <text x="16" y="156" font-weight="700" fill="#E7E2F0">worker_walk.png</text>
      <text x="16" y="176" fill="#8B84A0">384 × 128 · 4f strip</text>
      <use href="#ic-film" x="190" y="146" width="20" height="20" color="#FF6BA9"/>
    </g>
    <g transform="translate(486,140)">
      <rect width="226" height="190" rx="14" fill="#15121E" stroke="#46415C"/>
      <rect x="14" y="14" width="198" height="118" rx="10" fill="url(#checker)"/>
      <g transform="translate(70,38)"><circle cx="40" cy="40" r="34" fill="#FFB638"/><circle cx="32" cy="34" r="5" fill="#3D3851"/><circle cx="50" cy="34" r="5" fill="#3D3851"/></g>
      <text x="16" y="156" font-weight="700" fill="#E7E2F0">customer_01.png</text>
      <text x="16" y="176" fill="#8B84A0">96 × 128 · PNG</text>
    </g>
    <g transform="translate(728,140)">
      <rect width="226" height="190" rx="14" fill="#15121E" stroke="#FF6BA9" stroke-opacity="0.7" stroke-width="2"/>
      <rect x="14" y="14" width="198" height="118" rx="10" fill="url(#checker)"/>
      <g transform="translate(80,42)"><rect width="66" height="34" rx="12" fill="#2BB68C"/><rect x="14" y="11" width="38" height="10" rx="5" fill="#DCF6EC"/></g>
      <text x="16" y="156" font-weight="700" fill="#FFFFFF">btn_buy.png</text>
      <text x="16" y="176" fill="#FF9AC6">132 × 68 · selected</text>
    </g>
    <!-- row 2 -->
    <g transform="translate(244,348)">
      <rect width="226" height="190" rx="14" fill="#15121E" stroke="#46415C"/>
      <rect x="14" y="14" width="198" height="118" rx="10" fill="url(#checker)"/>
      <g transform="translate(64,34)"><rect width="92" height="80" rx="12" fill="#6BE7BF"/><rect x="14" y="52" width="64" height="16" rx="8" fill="#1FC692"/></g>
      <text x="16" y="156" font-weight="700" fill="#E7E2F0">coffee_station.png</text>
      <text x="16" y="176" fill="#8B84A0">160 × 160 · PNG</text>
    </g>
    <g transform="translate(486,348)">
      <rect width="226" height="190" rx="14" fill="#15121E" stroke="#46415C"/>
      <rect x="14" y="14" width="198" height="118" rx="10" fill="url(#checker)"/>
      <g transform="translate(86,40)"><use href="#ic-spark" x="0" y="0" width="50" height="50" color="#FFD43B"/></g>
      <text x="16" y="156" font-weight="700" fill="#E7E2F0">coin_burst.png</text>
      <text x="16" y="176" fill="#8B84A0">128 × 128 · PNG</text>
    </g>
    <g transform="translate(728,348)">
      <rect width="226" height="190" rx="14" fill="#15121E" stroke="#46415C"/>
      <rect x="14" y="14" width="198" height="118" rx="10" fill="#15121E"/>
      <use href="#ic-sound" x="84" y="40" width="56" height="56" color="#5DAEFF"/>
      <text x="16" y="156" font-weight="700" fill="#E7E2F0">ding.mp3</text>
      <text x="16" y="176" fill="#8B84A0">0:01 · audio</text>
    </g>
  </g>
  <g transform="translate(244,556)">
    <rect width="710" height="60" rx="14" fill="none" stroke="#FF6BA9" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="7 7"/>
    <use href="#ic-spark" x="22" y="18" width="24" height="24" color="#FF6BA9"/>
    <text x="60" y="37" font-size="13.5" font-weight="800" fill="#FF9AC6">Generate a new asset with AI</text>
  </g>

  <!-- resize handle -->
  <rect x="1000" y="46" width="20" height="854" fill="#16121F"/><rect x="1008" y="450" width="4" height="44" rx="2" fill="#46415C"/>

  <!-- ===== RIGHT region: Game Runner (always dark media surface) ===== -->
  <rect x="1020" y="46" width="580" height="854" fill="#0F0B18"/>
  <rect x="1020" y="46" width="580" height="40" fill="url(#runbar)" opacity="0.9"/>
  <use href="#ic-game" x="1036" y="54" width="22" height="22" color="#fff"/><text x="1066" y="71" font-size="14" font-weight="800" fill="#fff">Game Runner</text>
  <rect x="1052" y="120" width="516" height="690" rx="14" fill="#1B1828" stroke="#46415C" stroke-width="2" stroke-dasharray="7 7"/>
  <use href="#ic-game" x="1286" y="420" width="48" height="48" color="#6E6786"/>
  <text x="1310" y="510" text-anchor="middle" font-size="16" font-weight="800" fill="#B7B0C6">Press ▶ to play</text>
  <g transform="translate(1266,540)"><rect width="88" height="34" rx="10" fill="#2E2A40" stroke="#46415C"/><use href="#ic-play" x="14" y="7" width="20" height="20" color="#3DD9A9"/><text x="58" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#E7E2F0">Play</text></g>

  <!-- annotation badges -->
  <g font-weight="800" font-size="14" text-anchor="middle" filter="url(#bdg)">
    <g><circle cx="300" cy="67" r="14" fill="#FF7A66" stroke="#fff" stroke-width="2.5"/><text x="300" y="72" fill="#fff">1</text></g>
    <g><circle cx="110" cy="168" r="14" fill="#FF7A66" stroke="#fff" stroke-width="2.5"/><text x="110" y="173" fill="#fff">2</text></g>
    <g><circle cx="841" cy="148" r="14" fill="#FFD43B" stroke="#fff" stroke-width="2.5"/><text x="841" y="153" fill="#1F1B2D">3</text></g>
    <g><circle cx="160" cy="848" r="14" fill="#FFD43B" stroke="#fff" stroke-width="2.5"/><text x="160" y="853" fill="#1F1B2D">4</text></g>
  </g>

  <!-- legend -->
  <rect x="0" y="900" width="1600" height="220" fill="#16121F"/><line x1="0" y1="900" x2="1600" y2="900" stroke="#46415C"/>
  <text x="40" y="940" font-size="19" font-weight="800" fill="#FFFFFF">Asset Viewer — Split mode</text>
  <text x="360" y="940" font-size="13" fill="#8B84A0">— a 4th "Assets" tab in the left tab strip; the same pane as Window mode; Game Runner stays pinned on the right</text>
  <g font-size="13">
    <g transform="translate(40,968)">
      <g><circle cx="11" cy="8" r="11" fill="#FF7A66"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">1</text><text x="30" y="4" font-weight="800" fill="#fff">New "Assets" tab</text><text x="30" y="23" fill="#B7B0C6">SPLIT_TABS gains 'assets' next to Chat / Code; selecting it shows the Asset Viewer pane.</text></g>
      <g transform="translate(0,54)"><circle cx="11" cy="8" r="11" fill="#FF7A66"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">2</text><text x="30" y="4" font-weight="800" fill="#fff">Same rail + grid + actions</text><text x="30" y="23" fill="#B7B0C6">One AssetViewerPane component renders in both modes — no duplicated UI.</text></g>
    </g>
    <g transform="translate(820,968)">
      <g><circle cx="11" cy="8" r="11" fill="#FFD43B"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#1F1B2D">3</text><text x="30" y="4" font-weight="800" fill="#fff">Click a card → detail</text><text x="30" y="23" fill="#B7B0C6">Opens multi-background preview + metadata + code-ref + AI panel — see mockup-asset-detail.svg.</text></g>
      <g transform="translate(0,54)"><circle cx="11" cy="8" r="11" fill="#FFD43B"/><text x="11" y="13" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">4</text><text x="30" y="4" font-weight="800" fill="#fff">Import / Generate</text><text x="30" y="23" fill="#B7B0C6">Same actions as Window mode; new assets flow through projectStore → history → IndexedDB.</text></g>
    </g>
  </g>
</svg>
