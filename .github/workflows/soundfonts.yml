# Publish the Music Stage sample library to our own origin (music-stage-prd §6.1, OQ-3).
#
# WHY: kid browsers must never fetch media from a third-party CDN. `soundfont.ts`
# keeps the whole smplr path closed in production unless VITE_SOUNDFONT_BASE_URL
# points at an origin we control — this workflow is what makes that origin exist.
#
# WHAT: three tiers of sound material. (1) `sf2/GeneralUser-GS.sf2` — the full
# soundfont the SpessaSynth Tier-0 engine synthesizes from (D-MS19). (2) The GM
# programs the §5 style table + vocal tracks use (gleitz MusyngKite layout —
# the smplr fallback tier; FluidR3_GM objects from earlier runs stay on the
# origin for previously-cached bundles). (3) The 3 sampled drum machines
# (smpldsnds layout: dm.json + ogg/m4a samples). Each dm.json carries an
# ABSOLUTE baseUrl back to the upstream host, so it is rewritten to ours —
# otherwise hosting dm.json alone would still pull samples off-site.
#
# WHERE: s3://airbotix-app-prod/soundfonts/ — the SPA's own bucket + CloudFront
# distribution, so samples are same-origin (no CORS, no new infra). deploy.yml
# excludes `soundfonts/*` from its `--delete` sync so app deploys never wipe them.
#
# WHEN: run once (workflow_dispatch); re-run only to add programs/kits. Sample
# bytes are static and content-addressed by name, cached immutable for a year.
#
# SOURCES + LICENCE: MusyngKite soundfont (freely redistributable) via
# gleitz/midi-js-soundfonts (repo MIT); drum machines via smpldsnds (samples
# released for free use by their authors).
name: Publish soundfonts

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  S3_BUCKET: airbotix-app-prod
  CF_DISTRIBUTION_ID: E1CN0CC163N595
  SOUNDFONT_UPSTREAM: https://gleitz.github.io/midi-js-soundfonts
  DRUMS_UPSTREAM: https://smpldsnds.github.io/drum-machines
  # Must match VITE_SOUNDFONT_BASE_URL in deploy.yml — it is baked into the
  # rewritten dm.json files, so the two cannot drift.
  PUBLIC_BASE: https://app.airbotix.ai/soundfonts

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the GM programs used by the §5 style table + vocal tracks
        # Keep this list (and SOUNDFONT_KIT) in sync with GM_PROGRAM_SOUNDFONTS
        # in src/pages/learn/workspace/stage/soundfont.ts. choir_aahs/voice_oohs
        # back the vocal-track override in voices.ts (VOCAL_GM_PROGRAMS).
        run: |
          set -euo pipefail
          mkdir -p out/MusyngKite
          for name in \
            acoustic_grand_piano electric_piano_1 music_box drawbar_organ \
            acoustic_guitar_steel electric_guitar_clean overdriven_guitar \
            electric_bass_finger electric_bass_pick synth_bass_1 \
            lead_2_sawtooth pad_2_warm choir_aahs voice_oohs
          do
            echo "→ $name"
            curl -fsSL "$SOUNDFONT_UPSTREAM/MusyngKite/${name}-mp3.js" \
              -o "out/MusyngKite/${name}-mp3.js"
          done

      - name: Fetch the GeneralUser GS soundfont (SpessaSynth Tier-0 engine)
        # music-stage-prd D-MS19: the SpessaSynth engine plays a real .sf2.
        # GeneralUser GS (S. Christian Collins) is freely redistributable; the
        # canonical copy lives in mrbumpy409/GeneralUser-GS behind Git LFS, so
        # fetch via media.githubusercontent and sanity-check we didn't download
        # an LFS pointer file instead of the 32MB RIFF.
        run: |
          set -euo pipefail
          mkdir -p out/sf2
          curl -fsSL \
            "https://media.githubusercontent.com/media/mrbumpy409/GeneralUser-GS/main/GeneralUser-GS.sf2" \
            -o out/sf2/GeneralUser-GS.sf2
          size=$(stat -c%s out/sf2/GeneralUser-GS.sf2)
          if [ "$size" -lt 20000000 ]; then
            echo "✖ GeneralUser-GS.sf2 is only ${size}B — LFS pointer instead of the soundfont?" >&2
            exit 1
          fi
          head -c 4 out/sf2/GeneralUser-GS.sf2 | grep -q "RIFF"

      - name: Fetch the drum machines and re-home their dm.json baseUrl
        run: |
          set -euo pipefail
          for machine in LM-2 Casio-RZ1 TR-808; do
            echo "→ $machine"
            dir="out/drum-machines/$machine"
            mkdir -p "$dir"
            curl -fsSL "$DRUMS_UPSTREAM/$machine/dm.json" -o "$dir/dm.json.orig"
            # Do NOT fetch from the manifest's own baseUrl: upstream writes it
            # lowercased ("…/drum-machines/lm-2/") while the samples actually sit
            # under the machine's cased directory ("…/LM-2/"), so that path 404s on
            # a case-sensitive host. Fetch from the cased path that resolves; the
            # re-homing below then hands our origin a manifest that is *correct*,
            # not just local.
            # Sample names may themselves be PATHS (TR-808 ships 116 of them, e.g.
            # "kick/bd0000") — mirror that tree locally or curl has nowhere to write.
            for sample in $(jq -r '.samples[]' "$dir/dm.json.orig"); do
              mkdir -p "$dir/$(dirname "$sample")"
              for fmt in $(jq -r '.formats[]' "$dir/dm.json.orig"); do
                curl -fsSL "$DRUMS_UPSTREAM/$machine/${sample}.${fmt}" \
                  -o "$dir/${sample}.${fmt}"
              done
            done
            # Point the manifest at OUR origin — this is the step that actually
            # stops kid browsers from calling smpldsnds.github.io.
            jq --arg base "$PUBLIC_BASE/drum-machines/$machine/" \
              '.baseUrl = $base' "$dir/dm.json.orig" > "$dir/dm.json"
            rm "$dir/dm.json.orig"
            if grep -q "smpldsnds" "$dir/dm.json"; then
              echo "dm.json for $machine still references the upstream host" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::026559016816:role/gh-actions-deploy-airbotix-app
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        # Immutable: every object here is a fixed sample byte-blob addressed by
        # name; a change means a new program/kit, not a mutated file.
        run: |
          set -euo pipefail
          du -sh out
          aws s3 sync out/ "s3://${S3_BUCKET}/soundfonts/" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/soundfonts/*"

      - name: Verify the published origin
        # Prove the two things a kid's browser actually needs: a melodic program
        # loads, and a drum sample loads THROUGH the re-homed manifest's baseUrl.
        # HTTP 200 alone is NOT proof: CloudFront's SPA error mapping serves
        # index.html as 200 for any missing object (that masked the 2026-07
        # sample-library outage for 9 days) — so every check also rejects
        # text/html bodies.
        run: |
          set -euo pipefail
          not_spa_fallback() {
            # $1 = URL. Fails when the origin answers with the SPA's index.html.
            ct=$(curl -fsSI "$1" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2}')
            echo "  $1 → ${ct}"
            case "$ct" in text/html*) echo "✖ SPA fallback served for $1" >&2; return 1;; esac
          }
          not_spa_fallback "$PUBLIC_BASE/MusyngKite/acoustic_grand_piano-mp3.js"
          not_spa_fallback "$PUBLIC_BASE/MusyngKite/choir_aahs-mp3.js"
          not_spa_fallback "$PUBLIC_BASE/sf2/GeneralUser-GS.sf2"
          for machine in LM-2 Casio-RZ1 TR-808; do
            dm=$(curl -fsSL "$PUBLIC_BASE/drum-machines/$machine/dm.json")
            base=$(echo "$dm" | jq -r '.baseUrl')
            echo "$base" | grep -q "^https://app.airbotix.ai/soundfonts/"
            # Load a real sample THROUGH the re-homed baseUrl — "dm.json exists"
            # must never again pass for "the drums actually play".
            sample=$(echo "$dm" | jq -r '.samples[0]')
            echo "✓ $machine ← ${base}${sample}.ogg"
            not_spa_fallback "${base}${sample}.ogg"
          done
